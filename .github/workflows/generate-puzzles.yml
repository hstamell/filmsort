name: Generate Monthly Puzzles

on:
  schedule:
    # Run on the 1st of every month at 08:00 UTC
    - cron: '0 8 1 * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of puzzles to generate'
        required: false
        default: '35'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate puzzles
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Find the last date in puzzles.json and start from the next day
          LAST_DATE=$(node -e "
            const p = require('./data/puzzles.json');
            const sorted = p.sort((a,b) => a.date.localeCompare(b.date));
            const last = sorted[sorted.length-1].date;
            const d = new Date(last);
            d.setDate(d.getDate() + 1);
            console.log(d.toISOString().split('T')[0]);
          ")
          COUNT=${{ github.event.inputs.count || '35' }}
          echo "Generating $COUNT puzzles starting from $LAST_DATE"
          npm run generate-puzzles -- $COUNT $LAST_DATE

      - name: Commit and push new puzzles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/puzzles.json
          git diff --staged --quiet || git commit -m "chore: add puzzles for next month"
          git push
